name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential emacs-nox libsqlite3-dev pkg-config

      - name: Install Emacs package dependencies
        run: emacs -Q --batch -l .github/install-emacs-packages.el

      - name: Run local verification gate
        run: make test

      - name: Check benchmark gate report
        run: test -s target/refbox-bench/ci.json

      - name: Check bundled SQLite build
        run: make build-bundled-sqlite
